services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: lumina_db
    environment:
      POSTGRES_USER: lumina_admin
      POSTGRES_PASSWORD: lumina_secure_password
      POSTGRES_DB: lumina_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina_admin -d lumina_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumina_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the db service inside Docker network
      - DATABASE_URL=postgresql+asyncpg://lumina_admin:lumina_secure_password@db:5432/lumina_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lumina_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
